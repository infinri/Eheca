; Production PHP settings for Eheca Framework

; Error handling
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php/php_errors.log
log_errors_max_len = 0 ; No limit on error log length
track_errors = Off

; File uploads
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20
max_input_time = 60
max_execution_time = 300

; Memory limits
memory_limit = 256M

; Performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; OPcache configuration
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.enable_cli = 0
opcache.jit = 1255
opcache.jit_buffer_size = 100M

; Session handling
session.save_handler = files
session.save_path = "/var/lib/php/sessions"
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = "EHECA_SESSID"
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.sid_length = 32
session.trans_sid_tags = "a=href,area=href,frame=src,form="
session.sid_bits_per_character = 5
session.gc_maxlifetime = 14400
session.gc_probability = 1
session.gc_divisor = 1000

; Security
allow_url_fopen = Off
allow_url_include = Off
expose_php = Off
mail.add_x_header = Off

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Disable PHP in uploads directory
php_admin_flag engine off

; Set timezone
date.timezone = UTC

; Disable remote code execution
allow_url_fopen = Off
allow_url_include = Off

; Set default character encoding
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8
mbstring.http_output = UTF-8

; Set upload limits
max_input_vars = 5000
max_input_nesting_level = 128
max_input_time = 60

; Disable session ID in URL
session.use_trans_sid = 0
session.use_only_cookies = 1

; Disable directory listing
if (${PHP_CLI} != 'cli') {
    php_flag engine off
}

; Disable X-Powered-By header
expose_php = Off

; Disable remote code execution
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Disable dangerous PHP functions in specific directories
<Directory "/var/www/yourproject/uploads">
    php_admin_flag engine off
</Directory>

<Directory "/var/www/yourproject/vendor">
    php_admin_flag engine off
</Directory>


