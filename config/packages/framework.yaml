framework:
    secret: '%env(APP_SECRET)%'
    # Enable the session system
    session:
        handler_id: null
        cookie_secure: 'auto'
        cookie_samesite: 'lax'
        storage_factory_id: 'session.storage.factory.native'
    # Enable form support if needed
    form: 
        enabled: true
    # Enable CSRF protection
    csrf_protection: true
    # Enable HTTP method override (for REST APIs)
    http_method_override: true
    # Trusted proxies configuration (important for load balancers)
    trusted_headers: ['x-forwarded-for', 'x-forwarded-port', 'x-forwarded-proto']
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    # Configure the PHP errors to throw exceptions
    php_errors:
        log: true
        throw: true
    # Configure the default locale
    default_locale: 'en'
    # Configure the router
    router:
        strict_requirements: '%kernel.debug%'
        utf8: true
    # Configure the assets
    assets: 
        enabled: true
    # Configure the cache
    cache:
        directory: '%kernel.cache_dir%/pools'
        system: cache.adapter.system
    # Configure the property access
    property_access:
        enabled: true
    # Configure the property info
    property_info:
        enabled: true
